name: Build Aeternum Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: Build mod
        run: ./gradlew build --no-daemon
        continue-on-error: true

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: aeternum-mod
          path: build/libs/*.jar
          if-no-files-found: warn
          retention-days: 30
        if: always()
